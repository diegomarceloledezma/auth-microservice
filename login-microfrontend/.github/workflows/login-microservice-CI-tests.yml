name: Login Microfrontend CI

on:
  pull_request:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: login-microfrontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build